name: Claude Code — P2P Skill Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest

    # Prevent Claude triggering itself in a loop
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write        # read files, commit changes
      pull-requests: write   # open PRs, post comments
      issues: write          # reply to issues
      id-token: write        # required for OIDC authentication - rev1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so Claude can diff accurately

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Claude reads CLAUDE.md automatically — project rules are enforced
          # without needing to repeat them in every issue comment

          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-6
